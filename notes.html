<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Navigation -->
  <nav class="bg-white shadow p-4 flex justify-around">
    <a href="index.html" class="text-blue-600 font-semibold">Home</a>
    <a href="notes.html" class="text-blue-600 font-semibold">Notes</a>
    <a href="essay.html" class="text-blue-600 font-semibold">Essay</a>
    <a href="avatar.html" class="text-blue-600 font-semibold">XP & Avatar</a>
  </nav>

  <main class="p-6">
    <h1 class="text-3xl font-bold mb-4">Notes Library</h1>

    <!-- Upload -->
    <input type="file" id="noteUpload" multiple class="border p-2 rounded w-full mb-2">
    <button onclick="addNotes()" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">Add Notes</button>

    <!-- Search -->
    <input type="text" id="searchBar" placeholder="Search notes..." onkeyup="filterNotes()" class="border p-2 rounded w-full mb-4">

    <!-- Notes List -->
    <ul id="noteList" class="list-disc list-inside space-y-1"></ul>
  </main>

  <script>
    let noteList = [];

    // Add files to list
    function addNotes(){
      const files = document.getElementById('noteUpload').files;
      for(let i=0; i<files.length; i++){
        noteList.push({name: files[i].name, file: files[i]});
      }
      renderNotes();
    }

    // Display notes
    function renderNotes(){
      const ul = document.getElementById('noteList');
      ul.innerHTML = '';
      noteList.forEach((note, index) => {
        const li = document.createElement('li');
        li.classList.add("flex","justify-between","items-center","bg-white","p-2","rounded","shadow");

        const span = document.createElement('span');
        span.textContent = note.name;
        li.appendChild(span);

        const downloadBtn = document.createElement('button');
        downloadBtn.textContent = "Download";
        downloadBtn.classList.add("bg-green-600","text-white","px-2","py-1","rounded","ml-2");
        downloadBtn.onclick = () => downloadNote(note.file);
        li.appendChild(downloadBtn);

        ul.appendChild(li);
      });
    }

    // Download functionality
    function downloadNote(file){
      const url = URL.createObjectURL(file);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.name;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Search notes
    function filterNotes(){
      const query = document.getElementById('searchBar').value.toLowerCase();
      const filtered = noteList.filter(note => note.name.toLowerCase().includes(query));
      const ul = document.getElementById('noteList');
      ul.innerHTML = '';
      filtered.forEach(note => {
        const li = document.createElement('li');
        li.classList.add("flex","justify-between","items-center","bg-white","p-2","rounded","shadow");
        const span = document.createElement('span');
        span.textContent = note.name;
        li.appendChild(span);
        const downloadBtn = document.createElement('button');
        downloadBtn.textContent = "Download";
        downloadBtn.classList.add("bg-green-600","text-white","px-2","py-1","rounded","ml-2");
        downloadBtn.onclick = () => downloadNote(note.file);
        li.appendChild(downloadBtn);
        ul.appendChild(li);
      });
    }
  </script>

</body>
</html>
