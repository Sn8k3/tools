<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Notiv</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --surface2: #1f1f24;
  --border: #2a2a30;
  --border2: #38383f;
  --text: #eeecea;
  --text2: #9b9899;
  --text3: #5c5a5e;
  --accent: #c8f05e;
  --accent-dim: rgba(200,240,94,0.10);
  --accent-border: rgba(200,240,94,0.25);
  --coral: #f0635a;
  --radius: 10px;
  --radius-lg: 16px;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 70% 20%, rgba(200,240,94,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 80%, rgba(157,123,234,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  z-index: 1;
}

.logo-wrap {
  text-align: center;
}
.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  text-decoration: none;
}
.logo-dot { color: var(--accent); }
.logo-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px; gap: 3px;
}
.tab-btn {
  flex: 1; padding: 8px; border-radius: 7px; border: none;
  background: none; color: var(--text3); font-family: inherit;
  font-size: 13px; cursor: pointer; transition: all 0.12s; text-align: center;
}
.tab-btn.active { background: var(--surface); color: var(--text); }

/* Form */
.form { display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text3); }
.field input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-family: inherit; font-size: 14px; color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent-border); }
.field input::placeholder { color: var(--text3); }

.error-msg {
  font-size: 12px; color: var(--coral);
  background: rgba(240,99,90,0.08);
  border: 1px solid rgba(240,99,90,0.2);
  border-radius: 7px; padding: 8px 12px;
  display: none;
}
.error-msg.visible { display: block; }

.success-msg {
  font-size: 12px; color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: 7px; padding: 8px 12px;
  display: none; text-align: center;
}
.success-msg.visible { display: block; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-family: inherit; font-size: 14px;
  cursor: pointer; transition: all 0.12s; font-weight: 500;
  width: 100%;
}
.btn:hover { border-color: var(--border2); color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.primary {
  background: var(--accent); border-color: var(--accent);
  color: #0e0e10; font-weight: 600;
}
.btn.primary:hover:not(:disabled) { background: #d4f66e; }

.divider {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text3);
}
.divider-line { flex: 1; height: 1px; background: var(--border); }

.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 11px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 14px;
  cursor: pointer; transition: all 0.12s; font-weight: 500;
  width: 100%;
}
.google-btn:hover { border-color: var(--border2); background: var(--surface); }

.google-icon {
  width: 18px; height: 18px; flex-shrink: 0;
}

.terms {
  font-size: 11px; color: var(--text3); text-align: center; line-height: 1.5;
}
.terms a { color: var(--text2); }

.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(14,14,16,0.3);
  border-top-color: #0e0e10; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <a href="index.html" class="logo">Notiv<span class="logo-dot">.</span></a>
    <div class="logo-sub">Your AI-powered study companion</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
    <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create account</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Sign in form -->
  <div class="form" id="form-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitSignin()">
    </div>
    <button class="btn primary" id="signin-btn" onclick="submitSignin()">Sign in</button>
  </div>

  <!-- Sign up form -->
  <div class="form" id="form-signup" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="signup-confirm" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')submitSignup()">
    </div>
    <button class="btn primary" id="signup-btn" onclick="submitSignup()">Create account</button>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span>or</span>
    <div class="divider-line"></div>
  </div>

  <button class="google-btn" onclick="submitGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="terms">
    By signing in you agree to Notiv's terms of service and privacy policy.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uorlszhcjrblrbmhgyqb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvcmxzemhjanJibHJibWhneXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTg3OTMsImV4cCI6MjA4OTA3NDc5M30.zeDHQMKzlw-fKkulYlBUJOhniYiN30WZK12sZTgLElg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const BASE = 'https://sn8k3.github.io/tools/';

// Get redirect target
const params = new URLSearchParams(window.location.search);
const redirectTo = params.get('redirect') || BASE + 'dashboard.html';

// If already logged in, redirect
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = BASE + 'dashboard.html';
});

function switchTab(tab) {
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-signin').style.display = tab === 'signin' ? 'flex' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'flex' : 'none';
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('success-msg').classList.remove('visible');
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('error-msg').classList.remove('visible');
}
function hideMessages() {
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('success-msg').classList.remove('visible');
}

function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  btn.disabled = on;
  btn.innerHTML = on
    ? '<div class="spinner"></div> Please wait…'
    : (btnId === 'signin-btn' ? 'Sign in' : 'Create account');
}

async function submitSignin() {
  const email = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) { showError('Please fill in all fields'); return; }
  setLoading('signin-btn', true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    // Check if profile exists — if table missing or no row, go to onboarding
    try {
      const { data: profile } = await sb.from('profiles').select('id').eq('id', data.user.id).single();
      window.location.href = profile ? BASE + 'dashboard.html' : BASE + 'onboarding.html';
    } catch {
      window.location.href = BASE + 'onboarding.html';
    }
  } catch (err) {
    showError(err.message || 'Sign in failed');
    setLoading('signin-btn', false);
  }
}

async function submitSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }
  if (password !== confirm) { showError('Passwords do not match'); return; }
  setLoading('signup-btn', true);
  try {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) throw error;
    if (data.session) {
      window.location.href = BASE + 'onboarding.html';
    } else {
      showSuccess('Account created! Check your email to confirm, then sign in.');
      setLoading('signup-btn', false);
    }
  } catch (err) {
    showError(err.message || 'Sign up failed');
    setLoading('signup-btn', false);
  }
}

async function submitGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: BASE + 'login.html' },
  });
  if (error) showError(error.message);
}
</script>
</body>
</html>
